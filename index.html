
<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rohith Saravanakumar | Premium Developer Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0F0F12 0%, #1a1a2e 50%, #16213e 100%);
            background-attachment: fixed;
            color: #EAEAEA;
            overflow-x: hidden;
        }
        
        .mono {
            font-family: 'Fira Code', monospace;
        }
        
        /* Glassmorphism */
        .glass {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        /* Animated gradient text */
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .gradient-text {
            background: linear-gradient(45deg, #6C5DD3, #3B82F6, #6C5DD3);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient 4s ease infinite;
        }
        
        /* Glowing effect */
        .glow {
            box-shadow: 0 0 25px rgba(108, 93, 211, 0.5), 0 0 50px rgba(108, 93, 211, 0.3), 0 0 75px rgba(59, 130, 246, 0.2);
        }
        
        .glow-cyan {
            box-shadow: 0 0 25px rgba(108, 93, 211, 0.5), 0 0 50px rgba(108, 93, 211, 0.3);
        }
        
        /* Floating animation */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        
        .float {
            animation: float 6s ease-in-out infinite;
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(10, 14, 39, 0.5);
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #6C5DD3, #3B82F6);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, #8B7FEA, #60A5FA);
        }
        
        /* Neon border animation */
        @keyframes neon-border {
            0%, 100% { border-color: rgba(108, 93, 211, 0.5); }
            50% { border-color: rgba(59, 130, 246, 0.5); }
        }
        
        .neon-border {
            animation: neon-border 3s ease-in-out infinite;
        }
    </style>
